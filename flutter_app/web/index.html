<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta
    name="description"
    content="Voleybol takim ismini birlikte belirlemek icin hizli ve mobil uyumlu oylama uygulamasi."
  >

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Takim Ismi Oylamasi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Takim Ismi Oylamasi</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      if (!("serviceWorker" in navigator)) {
        return;
      }

      window.addEventListener("load", function () {
        navigator.serviceWorker.getRegistrations().then(async function (registrations) {
          if (!registrations.length) {
            sessionStorage.removeItem("flutter-sw-reset");
            return;
          }

          await Promise.all(
            registrations.map(function (registration) {
              return registration.unregister();
            }),
          );

          if (!sessionStorage.getItem("flutter-sw-reset")) {
            sessionStorage.setItem("flutter-sw-reset", "1");
            window.location.reload();
            return;
          }

          sessionStorage.removeItem("flutter-sw-reset");
        }).catch(function () {
          sessionStorage.removeItem("flutter-sw-reset");
        });
      });
    }());
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
