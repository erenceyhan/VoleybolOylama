<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="description"
    content="Voleybol takim ismini birlikte belirlemek icin hizli ve mobil uyumlu oylama uygulamasi."
  >

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Takim Ismi Oylamasi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Takim Ismi Oylamasi</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      const resetKey = 'flutter-sw-reset-2026-04-12-1';

      function loadFlutterBootstrap() {
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        script.async = true;
        document.body.appendChild(script);
      }

      if (!('serviceWorker' in navigator)) {
        loadFlutterBootstrap();
        return;
      }

      let storage;
      try {
        storage = window.localStorage;
      } catch (_) {
        loadFlutterBootstrap();
        return;
      }

      if (storage.getItem(resetKey) === 'done') {
        loadFlutterBootstrap();
        return;
      }

      navigator.serviceWorker.getRegistrations()
        .then(function (registrations) {
          if (!registrations.length) {
            storage.setItem(resetKey, 'done');
            loadFlutterBootstrap();
            return;
          }

          return Promise.all(
            registrations.map(function (registration) {
              return registration.unregister();
            }),
          ).then(function () {
            storage.setItem(resetKey, 'done');
            window.location.reload();
          });
        })
        .catch(function () {
          loadFlutterBootstrap();
        });
    }());
  </script>
</body>
</html>
